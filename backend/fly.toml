# fly.toml — CrewSight backend on Fly.io
# Docs: https://fly.io/docs/reference/configuration/
#
# Before first deploy:
#   fly launch --no-deploy          (creates the app, keeps this file)
#   fly volumes create coral_data --size 1 --region iad
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
#   fly deploy

app = 'crewsight-backend'
primary_region = 'iad'

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  dockerfile = 'Dockerfile'

# ── Non-secret environment variables ─────────────────────────────────────────
# Secrets (API keys, tokens) must be set via: fly secrets set KEY=value
[env]
  PORT       = "8000"
  CACHE_TTL  = "300"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes           = ['app']

  # Health check — FastAPI /health returns {"status": "ok", ...}
  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/health"
    timeout       = "5s"

# ── VM size ───────────────────────────────────────────────────────────────────
[[vm]]
  memory   = '512mb'
  cpu_kind = 'shared'
  cpus     = 1

# ── Persistent volume for Coral source configs ────────────────────────────────
# start.sh symlinks ~/.coral → /data/coral so credentials survive deploys.
# Create before first deploy: fly volumes create coral_data --size 1 --region iad
[[mounts]]
  source      = 'coral_data'
  destination = '/data/coral'
