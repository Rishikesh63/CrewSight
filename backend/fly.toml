# fly.toml app configuration file generated for crewsight-backend on 2026-05-28T18:02:55+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crewsight-backend'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CACHE_TTL = '300'
  DATA_DIR = '/data/coral'
  PORT = '8000'

[[mounts]]
  source = 'coral_data'
  destination = '/data/coral'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
